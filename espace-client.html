<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace Client — JCODE Agency</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--glass:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.08);--primary:#00f0ff;--accent:#ff006e;--text:#fff;--muted:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
body::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,240,255,0.06) 0%,transparent 70%);border-radius:50%}
body::after{content:'';position:absolute;bottom:-200px;left:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(255,0,110,0.05) 0%,transparent 70%);border-radius:50%}
.login-card{background:var(--glass);backdrop-filter:blur(30px);border:1px solid var(--glass-border);border-radius:24px;padding:48px;width:100%;max-width:420px;position:relative;z-index:1}
.login-card h1{font-size:1.8rem;font-weight:800;margin-bottom:8px;text-align:center}
.login-card .sub{color:var(--muted);text-align:center;margin-bottom:32px;font-size:14px}
.logo{text-align:center;margin-bottom:24px;font-size:2rem;font-weight:900}
.logo span{color:var(--primary)}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px}
.form-group input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);border-radius:12px;color:var(--text);font-size:15px;transition:border .3s}
.form-group input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 20px rgba(0,240,255,0.1)}
.btn-primary{width:100%;padding:16px;background:linear-gradient(135deg,var(--primary),#0080ff);color:var(--bg);border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;margin-top:8px}
.btn-primary:hover{transform:scale(1.02);box-shadow:0 0 30px rgba(0,240,255,0.3)}
.divider{text-align:center;color:var(--muted);font-size:13px;margin:24px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--glass-border)}
.divider::before{left:0}.divider::after{right:0}
.btn-magic{width:100%;padding:14px;background:transparent;border:1px solid var(--glass-border);border-radius:12px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:all .3s}
.btn-magic:hover{border-color:var(--primary);color:var(--primary)}
.back{display:block;text-align:center;margin-top:24px;color:var(--muted);font-size:13px;text-decoration:none}
.back:hover{color:var(--primary)}
.msg{display:none;padding:12px;border-radius:12px;font-size:13px;margin-top:16px;text-align:center}
.msg.success{display:block;background:rgba(0,240,255,0.1);color:var(--primary);border:1px solid rgba(0,240,255,0.2)}
.msg.error{display:block;background:rgba(255,0,110,0.1);color:var(--accent);border:1px solid rgba(255,0,110,0.2)}
</style>
</head>
<body>
<div class="login-card">
<div class="logo">J<span>CODE</span></div>
<h1>Espace Client</h1>
<p class="sub">Accédez à votre hub personnalisé : appels, deliverables, ROI</p>
<form id="loginForm" onsubmit="handleLogin(event)">
<div class="form-group">
<label>Email</label>
<input type="email" id="email" placeholder="votre@email.com" required>
</div>
<div class="form-group">
<label>Mot de passe</label>
<input type="password" id="password" placeholder="••••••••" required>
</div>
<button type="submit" class="btn-primary">Se connecter</button>
</form>
<div class="divider">ou</div>
<button class="btn-magic" onclick="sendMagicLink()">✉️ Recevoir un lien magique par email</button>
<div class="msg" id="msg"></div>
<a href="index.html" class="back">← Retour au site</a>
</div>
<script>
function handleLogin(e){
e.preventDefault();
const email=document.getElementById('email').value;
const pass=document.getElementById('password').value;
// Demo: check localStorage for registered users
const users=JSON.parse(localStorage.getItem('jcode_users')||'{}');
if(users[email]&&users[email]===pass){
localStorage.setItem('jcode_session',email);
window.location.href='hub-dashboard.html';
}else{
showMsg('Email ou mot de passe incorrect.','error');
}
}
function sendMagicLink(){
const email=document.getElementById('email').value;
if(!email){showMsg('Entrez votre email d\'abord.','error');return;}
showMsg('Lien magique envoyé à '+email+' ! Vérifiez votre boîte mail.','success');
}
function showMsg(text,type){
const msg=document.getElementById('msg');
msg.textContent=text;
msg.className='msg '+type;
}
</script>
</body>
</html>
